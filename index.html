<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dave & Mel — Personalised Meal Planner</title>
  <style>
    :root {
      /* Linear Dark Theme Palette */
      --bg-page: #080710;
      --bg-surface: #12111a;
      --bg-surface-hover: #1c1a27;
      --bg-muted: #171622;
      --border-primary: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(255, 255, 255, 0.16);
      
      /* Typography Colors */
      --text-primary: #f7f8f8;
      --text-secondary: #b4bcd0;
      --text-tertiary: #6b7280;
      
      /* Accent Colors */
      --brand-glow: rgba(94, 106, 210, 0.15);
      --brand-border: #5e6ad2;
      --accent-protein: #4ade80;
      --accent-carbs: #38bdf8;
      --accent-fats: #fb923c;
      --accent-cals: #e2e8f0;
      
      /* System Utilities */
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      --font-mono: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
      --radius-lg: 12px;
      --radius-md: 8px;
      --radius-sm: 4px;
      --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background-color: var(--bg-page);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      padding: 2rem 1.5rem 4rem;
    }

    .container {
      max-width: 1040px;
      margin: 0 auto;
    }

    /* Header & Branding */
    header {
      margin-bottom: 2rem;
    }

    h2#top {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h2#top::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand-border);
      box-shadow: 0 0 12px var(--brand-border);
    }

    /* Tabs (Linear Style Navigation) */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 3px;
      background: var(--bg-surface);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      margin-bottom: 2rem;
      max-width: fit-content;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      transition: var(--transition-fast);
    }

    .tab svg {
      width: 15px;
      height: 15px;
      stroke: currentColor;
    }

    .tab:hover {
      color: var(--text-primary);
      background: var(--bg-surface-hover);
    }

    .tab.active {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    /* Layout & Cards */
    .panel {
      display: none;
      animation: fadeIn 0.2s ease-out;
    }
    
    .panel.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .macro-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .person-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      transition: var(--transition-fast);
      position: relative;
      overflow: hidden;
    }

    .person-card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .person-card h3 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    .person-subtitle {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-tertiary);
      margin-bottom: 1.5rem;
    }

    /* Macro Rows */
    .macro-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .macro-row:last-of-type {
      border-bottom: none;
    }

    .macro-label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .macro-val {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
    }

    .macro-val.protein { color: var(--accent-protein); }
    .macro-val.carbs { color: var(--accent-carbs); }
    .macro-val.fats { color: var(--accent-fats); }
    .macro-val.cals { color: var(--accent-cals); }

    .note-box {
      background: var(--bg-muted);
      border-radius: var(--radius-md);
      padding: 1rem;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 1.25rem;
      border-left: 2px solid var(--brand-border);
    }

    .section-label {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-tertiary);
      margin: 2rem 0 1rem;
    }

    /* Recipe UI Elements */
    .recipe-intro {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .meal-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      margin-bottom: 0.75rem;
      overflow: hidden;
      transition: var(--transition-fast);
    }

    .meal-card:hover {
      border-color: var(--border-hover);
    }

    .meal-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 1.25rem;
      cursor: pointer;
      user-select: none;
    }

    .meal-check {
      width: 18px;
      height: 18px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: var(--transition-fast);
      background: transparent;
    }

    .meal-check:hover {
      border-color: var(--text-secondary);
    }

    .meal-check.checked {
      background: var(--brand-border);
      border-color: var(--brand-border);
      color: #fff;
    }

    .meal-check svg {
      width: 12px;
      height: 12px;
      display: none;
      stroke: currentColor;
      stroke-width: 3;
    }

    .meal-title-block {
      flex: 1;
    }

    .meal-name {
      font-weight: 500;
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    .meal-tags {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-weight: 500;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
